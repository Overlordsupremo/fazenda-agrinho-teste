<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha Agrinho - Ultimate Farming Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #fff; }
        
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 340px; box-shadow: 0 6px 0px #140d08; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 14px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        
        .bar-container { background: #000; border: 2px solid #444; padding: 2px; height: 18px; position: relative; margin-bottom: 4px; }
        .xp-fill { height: 100%; width: 0%; background: linear-gradient(to bottom, #22ff22, #00aa00); transition: width 0.1s; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0px; left: 0; font-size: 10px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }

        .btn-ui { width: 100%; margin-top: 4px; background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 4px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-ui:active { border-bottom-width: 2px; margin-top: 6px; margin-bottom: -2px; }

        #adm-trigger { position: absolute; top: 15px; right: 15px; background: #006600; color: #fff; border: 3px solid #33ff33; padding: 8px 12px; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 200; text-transform: uppercase; }
        #adm-panel { display: none; position: absolute; top: 60px; right: 15px; background: #111611; border: 4px solid #33ff33; padding: 12px; z-index: 200; width: 320px; color: #00ff00; max-height: 80vh; overflow-y: auto; }
        .adm-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }
        .adm-input { width: 50%; background: #222; border: 1px solid #33ff33; color: #00ff00; padding: 2px; font-family: inherit; }

        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; z-index: 100; }
        .hotbar-slot { width: 54px; height: 54px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 20px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 10px; color: #ffcc00; font-weight: bold; }

        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%); background-size: 16px 16px; z-index: 1; }
        #player { position: absolute; width: 42px; height: 52px; background: #ffdf7f; border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 50; }

        .character { position: absolute; width: 50px; height: 50px; font-size: 24px; z-index: 10; border: 3px solid #1a110b; display: flex; align-items: center; justify-content: center; }
        .npc-label { position: absolute; top: -24px; background: #1c120c; color: #f4ecd8; padding: 2px 5px; border: 2px solid #573b24; font-size: 9px; font-weight: bold; white-space: nowrap; }
        
        #farm-zones { position: absolute; top: 220px; left: 340px; display: flex; flex-wrap: wrap; gap: 6px; max-width: calc(100vw - 380px); z-index: 5; max-height: 65vh; overflow-y: auto; padding: 10px; }
        .plot { width: 68px; height: 68px; background: #422a18; border: 4px solid #26170c; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .crop { font-size: 28px; display: flex; flex-direction: column; align-items: center; }
        .crop.growing { filter: grayscale(80%) brightness(40%) scale(0.6); }
        
        .m-golden { filter: drop-shadow(0px 0px 4px #ffd700) brightness(1.2); }
        .m-frozen { filter: drop-shadow(0px 0px 4px #70c5ff) hue-rotate(140deg); }
        .m-divine { filter: drop-shadow(0px 0px 6px #ff00ff) brightness(1.3); }
        .m-radioactive { filter: drop-shadow(0px 0px 5px #39ff14) saturate(2); }
        .m-infernal { filter: drop-shadow(0px 0px 5px #ff3300) contrast(1.3); }
        
        .timer-bar { position: absolute; bottom: 2px; left: 2px; width: calc(100% - 4px); height: 4px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #38b349; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 16px; z-index: 200; width: 90%; max-width: 540px; color: #f4ecd8; box-shadow: 0 8px 0 #000; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 4px; margin-bottom: 8px; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 2px 6px; cursor: pointer; font-family: inherit; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 4px; max-height: 50vh; overflow-y: auto; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 6px; border: 2px solid #3d281a; background: #21160e; font-size: 11px; }
        .buy-btn { background: #2b5c16; color: white; border: 2px solid #142e09; padding: 3px 6px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .buy-btn:disabled { background: #444; border-color: #222; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>🌾 Fazenda Ricas Mutações - Agrinho</h2>
        <div class="bar-container">
            <div id="xp-bar" class="xp-fill"></div>
            <div id="xp-text" class="bar-text">XP Agrícola: 0 / 100 (Nível 1)</div>
        </div>
        <p><span>🪙 Moedas do Campo:</span> <span id="coin-count">150</span></p>
        <p><span>🌱 Item Equipado:</span> <span id="selected-seed-text">Mão Vazia</span></p>
        <p><span style="color:#bf8eff;">🔮 Bênção Ativa:</span> <span id="bless-status">Nenhuma</span></p>
        <button class="btn-ui" onclick="openBackpackModal()">🎒 Ver Bolsa & Mutadores [Espaço]</button>
        <button class="btn-ui" id="btn-buy-plot" onclick="buyNewPlot()" style="background:#c27f38; border-color:#6e4215;">🟫 Expandir Lotes de Terra (<span id="plot-cost">200</span> 🪙)</button>
    </div>

    <button id="adm-trigger" onclick="tryAccessAdm()">🛠️ Painel Bio-Hack</button>
    <div id="adm-panel">
        <h3>Modificação de Ecossistema</h3>
        <button class="buy-btn" style="width:100%; background:#00ff00; color:#000; margin-bottom:8px;" onclick="aplicarAlteracoesADM()">⚡ Aplicar Bio-Hacks</button>
        <div class="adm-row"><label>🪙 Moedas:</label><input type="number" id="adm-coins" class="adm-input" value="150"></div>
        <div class="adm-row"><label>⭐ Nível Fazendeiro:</label><input type="number" id="adm-lvl" class="adm-input" value="1"></div>
        <div class="adm-row"><label>🟫 Total Lotes (Max 40):</label><input type="number" id="adm-plots" class="adm-input" value="3"></div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">🧑‍🌾</div>
        <div id="npc-tiao" class="character" style="top: 25px; left: 360px; background: #2f4560;">🏪<span class="npc-label">Tião (Sementes) [E]</span></div>
        <div id="npc-mago" class="character" style="top: 25px; left: 540px; background: #50287a;">🧙‍♂️<span class="npc-label">Mago Alquimista [E]</span></div>
        <div id="npc-chico" class="character" style="top: 25px; left: 720px; background: #7a431d;">👨‍💼<span class="npc-label">Chico Exportador [E]</span></div>
        <div id="farm-zones"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header"><h3 id="modal-title">Painel</h3><button class="close-btn" onclick="closeModal()">X</button></div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        let player = { x: 200, y: 250, speed: 5, lvl: 1, xp: 0, nextXp: 100 };
        let gameState = { coins: 150, maxPlots: 3, activeHotbarSlot: 0, admUnlocked: false, fertilizanteAtivo: false, mutationBless: false };
        
        let hotbar = Array(8).fill(null).map(() => ({ id: null, qty: 0, type: '', data: null }));
        let plots = [];
        let keysPressed = {};
        
        // Mecânica de Estoque Limitado e Tempo de Reabastecimento (3 minutos = 180 segundos)
        let shopRestockTimer = 180;
        let seedStock = { maca: 5, banana: 5, cenoura: 5, laranja: 5, melancia: 5, uva: 5 };

        const fruitData = {
            maca: { name: "Maçã", icon: "🍎", basePrice: 15, time: 4, weightMin: 0.3 },
            banana: { name: "Banana", icon: "🍌", basePrice: 20, time: 6, weightMin: 0.2 },
            cenoura: { name: "Cenoura", icon: "🥕", basePrice: 22, time: 5, weightMin: 0.15 },
            laranja: { name: "Laranja", icon: "🍊", basePrice: 25, time: 8, weightMin: 0.4 },
            melancia: { name: "Melancia", icon: "🍉", basePrice: 80, time: 18, weightMin: 3.5 },
            uva: { name: "Uva Cósmica", icon: "🍇", basePrice: 115, time: 24, weightMin: 0.2 }
        };

        const mutationConfig = {
            golden: { label: "Dourada ✨", mult: 3.0, class: "m-golden" },
            frozen: { label: "Congelada ❄️", mult: 2.2, class: "m-frozen" },
            divine: { label: "Divina 🌌", mult: 6.0, class: "m-divine" },
            radioactive: { label: "Radioativa ☢️", mult: 4.5, class: "m-radioactive" },
            infernal: { label: "Infernal 🔥", mult: 7.0, class: "m-infernal" }
        };

        // Identificador de qual menu NPC está aberto no momento para atualizar em tempo real
        let currentOpenNPC = null;

        function init() {
            createPlots();
            updateUI();
            updateHotbarVisuals();

            // Intervalo de ciclo das plantas (0.1s)
            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= gameState.fertilizanteAtivo ? 0.2 : 0.1;
                        let totalTime = fruitData[plot.fruit].time;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;
                        if (plot.timer <= 0) { plot.status = 'ready'; renderPlotAsset(plot); }
                    }
                });
            }, 100);

            // Contador Regressivo de Reabastecimento (1s)
            setInterval(() => {
                if (shopRestockTimer > 0) {
                    shopRestockTimer--;
                } else {
                    shopRestockTimer = 180;
                    Object.keys(seedStock).forEach(key => seedStock[key] = 5); // Restoca para 5 sementes
                    if (currentOpenNPC === 'tiao') openNPCModal('tiao'); // Atualiza a tela se o jogador estiver olhando o menu
                }
                // Se a janela do Tião estiver aberta, atualiza o timer dinamicamente na tela
                if (currentOpenNPC === 'tiao') {
                    let timerEl = document.getElementById('restock-countdown');
                    if (timerEl) timerEl.innerText = formatTime(shopRestockTimer);
                }
            }, 1000);

            window.addEventListener('keydown', e => {
                keysPressed[e.key.toLowerCase()] = true;
                if (document.activeElement.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); openBackpackModal(); }
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
            });

            window.addEventListener('keyup', e => { delete keysPressed[e.key.toLowerCase()]; });

            gameLoop();
        }

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let seg = seconds % 60;
            return `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        // ... [Código administrativo mantido] ...
        function tryAccessAdm() {
            if (gameState.admUnlocked) {
                let panel = document.getElementById('adm-panel');
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            } else {
                if (prompt("Digite o código de acesso de laboratório:") === "agrinho2026") {
                    gameState.admUnlocked = true;
                    document.getElementById('adm-panel').style.display = 'block';
                } else { alert("Acesso negado!"); }
            }
        }

        function aplicarAlteracoesADM() {
            gameState.coins = parseInt(document.getElementById('adm-coins').value) || 0;
            player.lvl = parseInt(document.getElementById('adm-lvl').value) || 1;
            gameState.maxPlots = Math.min(parseInt(document.getElementById('adm-plots').value) || 3, 40);
            createPlots(); updateUI();
        }

        function buyNewPlot() {
            if (gameState.maxPlots >= 40) return alert("Capacidade de lotes máxima atingida!");
            let cost = 200 + (gameState.maxPlots * 180);
            if (gameState.coins >= cost) {
                gameState.coins -= cost; gameState.maxPlots++; createPlots(); updateUI();
            } else alert("Moedas insuficientes!");
        }

        function createPlots() {
            const container = document.getElementById('farm-zones'); container.innerHTML = '';
            let oldPlots = [...plots]; plots = [];
            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div'); plotDiv.className = 'plot'; container.appendChild(plotDiv);
                if (oldPlots[i]) { plots.push(oldPlots[i]); plots[i].element = plotDiv; if (plots[i].status !== 'empty') renderPlotAsset(plots[i]); }
                else { plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutations: [], weight: 1.0 }); plotDiv.innerHTML = `<span style="color:#26170c; font-size:8px; position:absolute; bottom:2px;">Terra</span>`; }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
            document.getElementById('plot-cost').innerText = 200 + (gameState.maxPlots * 180);
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit]; plot.element.innerHTML = '';
            let cropDiv = document.createElement('div'); cropDiv.className = `crop ${plot.status === 'growing' ? 'growing' : ''}`; cropDiv.innerText = data.icon;
            if (plot.status === 'ready') { plot.mutations.forEach(m => cropDiv.classList.add(mutationConfig[m].class)); }
            plot.element.appendChild(cropDiv);
            if (plot.status === 'growing') {
                let tb = document.createElement('div'); tb.className = 'timer-bar'; tb.innerHTML = `<div class="timer-fill"></div>`; plot.element.appendChild(tb);
            }
        }

        function handlePlotInteraction(index) {
            let plot = plots[index]; let activeItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeItem && activeItem.type === 'semente' && activeItem.qty > 0) {
                plot.status = 'growing'; plot.fruit = activeItem.id;
                plot.timer = fruitData[plot.fruit].time;
                plot.mutations = [];

                // Sistema adaptado para incluir os 40% de bônus do altar do mago
                let rand = Math.random();
                let chanceMutar = gameState.mutationBless ? 0.65 : 0.25; // Se tiver a bênção, a chance total sobe drasticamente

                if (rand < chanceMutar) {
                    let mutRand = Math.random();
                    if (mutRand < 0.10) plot.mutations.push('infernal');
                    else if (mutRand < 0.25) plot.mutations.push('divine');
                    else if (mutRand < 0.45) plot.mutations.push('radioactive');
                    else if (mutRand < 0.70) plot.mutations.push('golden');
                    else plot.mutations.push('frozen');
                    
                    // Consome a carga da bênção do mago após mutar com sucesso
                    if (gameState.mutationBless) {
                        gameState.mutationBless = false;
                        updateUI();
                    }
                }

                plot.weight = parseFloat((Math.random() * 1.5 + fruitData[plot.fruit].weightMin).toFixed(2));
                
                activeItem.qty--;
                if (activeItem.qty <= 0) hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', data: null };
                renderPlotAsset(plot); updateUI(); updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let finalMult = 1.0;
                plot.mutations.forEach(m => { finalMult *= mutationConfig[m].mult; });

                let calculatedPrice = fruitData[plot.fruit].basePrice * finalMult * plot.weight;
                let finalName = `${fruitData[plot.fruit].name} ${plot.mutations.length > 0 ? '['+mutationConfig[plot.mutations[0]].label+']' : ''} (${plot.weight}kg)`;

                addItemToHotbar(plot.fruit, 'fruta', { icon: fruitData[plot.fruit].icon, price: calculatedPrice, fullName: finalName });

                player.xp += Math.floor(20 * finalMult);
                if (player.xp >= player.nextXp) {
                    player.xp -= player.nextXp; player.lvl++; player.nextXp = Math.floor(player.nextXp * 1.4);
                }

                plot.status = 'empty'; plot.fruit = null; plot.element.innerHTML = `<span style="color:#26170c; font-size:8px; position:absolute; bottom:2px;">Terra</span>`;
                updateUI();
            }
        }

        function addItemToHotbar(id, type, dataBlock) {
            let slot = null;
            if (type === 'semente') {
                slot = hotbar.find(s => s.id === id && s.type === 'semente');
            }
            if (!slot) {
                slot = hotbar.find(s => s.id === null);
            }
            if (slot) {
                slot.id = id; slot.type = type; slot.qty = (slot.qty || 0) + 1; slot.data = dataBlock;
            }
            updateHotbarVisuals();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`); let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = item.data?.icon || "🌱";
                    slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                } else { slot.querySelector('.slot-icon').innerText = ''; slot.querySelector('.slot-qty').innerText = ''; }
            }
        }

        function handleNPCDetection() {
            if (Math.sqrt(Math.pow(player.x - 360, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('tiao');
            else if (Math.sqrt(Math.pow(player.x - 540, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('mago');
            else if (Math.sqrt(Math.pow(player.x - 720, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('chico');
        }

        function openNPCModal(npc) {
            currentOpenNPC = npc;
            let modal = document.getElementById('game-modal'); modal.style.display = 'block';
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            
            if (npc === 'tiao') {
                document.getElementById('modal-title').innerText = "Mercado Agrícola do Tião";
                content.innerHTML += `<div style="color:#ffcc00; font-size:11px; margin-bottom:8px; text-align:center;">Próxima entrega de sementes em: <span id="restock-countdown">${formatTime(shopRestockTimer)}</span></div>`;
                
                Object.keys(fruitData).forEach(k => {
                    let stock = seedStock[k];
                    let isOos = stock <= 0;
                    content.innerHTML += `
                        <div class="shop-item">
                            <div>🌱 Semente de ${fruitData[k].name} (Custo: 10 🪙) <br> <span style="color:${isOos ? '#ff3333':'#00ff00'}">Estoque: ${stock} un.</span></div>
                            <button class="buy-btn" ${isOos ? 'disabled' : ''} onclick="buySeed('${k}')">${isOos ? 'Esgotado' : 'Adquirir'}</button>
                        </div>`;
                });
            } 
            else if (npc === 'mago') {
                document.getElementById('modal-title').innerText = "Altar Alquimista e Eventos Místicos";
                content.innerHTML = `
                <p style="font-size:11px;">O Mago manipula o DNA cósmico vegetal em seus altares sagrados.</p>
                <div class="shop-item">
                    <div>🧪 Soro do Hipercrescimento <br><span style="color:#aaa">Culturas crescem 2x mais rápido de forma global.</span></div>
                    <button class="buy-btn" style="background:#50287a;" onclick="ativarSuperFertilizante()">Comprar (150 🪙)</button>
                </div>
                <div class="shop-item">
                    <div>✨ Bênção do Altar de Radiação (+40% Chance Mutação) <br><span style="color:#aaa">Aumenta em 40% a chance do próximo plantio sofrer mutação extrema.</span></div>
                    <button class="buy-btn" style="background:#bf8eff; color:#000;" ${gameState.mutationBless ? 'disabled' : ''} onclick="ativarAltarMutacao()">${gameState.mutationBless ? 'Já Ativo' : 'Encantar (100 🪙)'}</button>
                </div>`;
            } 
            else if (npc === 'chico') {
                document.getElementById('modal-title').innerText = "Chico - Exportação & Balança";
                let totalValor = 0;
                hotbar.forEach(i => { if (i && i.type === 'fruta') totalValor += i.data.price * i.qty; });
                content.innerHTML = `<p>Análise da carga atual da sua Bolsa:</p>
                <div style="background:#111; padding:8px; font-size:10px; margin-bottom:10px;">`;
                hotbar.forEach(i => { if(i && i.type === 'fruta') content.innerHTML += `▪️ ${i.data.fullName} x${i.qty} -> 🪙 ${Math.floor(i.data.price*i.qty)}<br>`; });
                content.innerHTML += `</div><h4>Total a receber: 🪙 ${Math.floor(totalValor)}</h4>
                <button class="buy-btn" style="width:100%;" onclick="venderTudoParaChico(${totalValor})">Descarregar e Vender Produtos</button>`;
            }
        }

        function buySeed(k) {
            if (seedStock[k] <= 0) return;
            if(gameState.coins >= 10) { 
                gameState.coins -= 10; 
                seedStock[k]--;
                addItemToHotbar(k, 'semente', { icon: "🌱" }); 
                updateUI(); 
                openNPCModal('tiao'); // Atualiza a tela imediatamente para abater o estoque visualmente
            } else alert("Falta de fundos monetários!");
        }

        function ativarSuperFertilizante() {
            if(gameState.coins >= 150) {
                gameState.coins -= 150; gameState.fertilizanteAtivo = true;
                alert("🔮 O Mago canalizou um feitiço! Culturas crescendo com o dobro de velocidade!");
                closeModal(); updateUI();
            } else alert("Falta de moedas para o feitiço!");
        }

        function ativarAltarMutacao() {
            if(gameState.coins >= 100) {
                gameState.coins -= 100;
                gameState.mutationBless = true;
                alert("⚛️ O Altar irradiou suas sementes! Próximo plantio terá +40% de chance de mutação genética rústica!");
                closeModal(); updateUI();
            } else alert("Moedas insuficientes para o Altar!");
        }

        function venderTudoParaChico(valor) {
            gameState.coins += valor;
            hotbar = hotbar.map(i => i && i.type === 'fruta' ? { id: null, qty: 0, type: '', data: null } : i);
            updateHotbarVisuals(); closeModal(); updateUI();
        }

        function openBackpackModal() {
            currentOpenNPC = null;
            let modal = document.getElementById('game-modal'); modal.style.display = 'block';
            document.getElementById('modal-title').innerText = "Bolsa do Fazendeiro";
            let content = document.getElementById('modal-content'); content.innerHTML = `<h3>Inventário de Mão</h3>`;
            hotbar.forEach((i, index) => {
                if (i && i.id) {
                    content.innerHTML += `<div class="shop-item"><div>[Slot ${index+1}] ${i.type==='semente'?'Semente de ':''}<b>${i.data?.fullName || i.id}</b> (Qtd: ${i.qty})</div></div>`;
                }
            });
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentOpenNPC = null; }
        
        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function gameLoop() {
            if (document.activeElement.tagName !== 'INPUT') {
                if (keysPressed['w'] || keysPressed['arrowup']) player.y -= player.speed;
                if (keysPressed['s'] || keysPressed['arrowdown']) player.y += player.speed;
                if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= player.speed;
                if (keysPressed['d'] || keysPressed['arrowright']) player.x += player.speed;
            }
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 120, player.y));
            document.getElementById('player').style.left = player.x+'px';
            document.getElementById('player').style.top = player.y+'px';
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(gameState.coins);
            document.getElementById('xp-bar').style.width = `${(player.xp / player.nextXp) * 100}%`;
            document.getElementById('xp-text').innerText = `XP Agrícola: ${player.xp} / ${player.nextXp} (Nível ${player.lvl})`;
            document.getElementById('bless-status').innerText = gameState.mutationBless ? "Altar de Radiação (+40%)" : "Nenhuma";
            let item = hotbar[gameState.activeHotbarSlot];
            document.getElementById('selected-seed-text').innerText = item && item.id ? (item.type === 'semente' ? `Semente de ${fruitData[item.id].name}` : item.data.fullName) : 'Mão Vazia';
        }

        window.onload = init;
    </script>
</body>
</html>
