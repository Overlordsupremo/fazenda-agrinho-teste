<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Retrô Agrinho - Bio-Mutations PRO</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #fff; }
        
        /* UI Superior */
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 340px; box-shadow: 0 6px 0px #140d08; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 14px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        #shop-timer { color: #ff5555; font-size: 11px; font-weight: bold; margin-top: 6px; text-align: center; background: #140808; padding: 2px; border: 2px solid #4a1515; }
        
        .btn-mochila { width: 100%; margin-top: 6px; background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 5px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; text-shadow: 1px 1px #000; }
        .btn-mochila:active { border-bottom-width: 2px; margin-top: 8px; margin-bottom: -2px; }

        /* PAINEL DE ADM PRO */
        #adm-trigger { position: absolute; top: 15px; right: 15px; background: #990000; color: #fff; border: 3px solid #ff3333; padding: 8px 12px; font-weight: bold; font-size: 12px; cursor: pointer; z-index: 200; box-shadow: 0 4px 0 #440000; text-transform: uppercase; }
        #adm-panel { display: none; position: absolute; top: 60px; right: 15px; background: #111116; border: 4px solid #ff3333; padding: 12px; z-index: 200; width: 320px; color: #00ff00; box-shadow: 0 6px 12px rgba(0,0,0,0.8); max-height: 85vh; overflow-y: auto; }
        #adm-panel h3 { margin: 0 0 10px 0; font-size: 14px; text-align: center; color: #ff3333; text-transform: uppercase; border-bottom: 2px solid #ff3333; padding-bottom: 4px; }
        .adm-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 11px; gap: 4px; }
        .adm-row label { width: 40%; color: #aaa; }
        .adm-input { width: 60%; background: #222; border: 1px solid #ff3333; color: #00ff00; padding: 3px; font-family: inherit; font-size: 11px; }
        .adm-btn-block { width: 100%; background: #ff3333; color: black; border: none; padding: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: inherit; font-size: 11px; margin-top: 5px; margin-bottom: 5px; }
        .adm-btn-block:hover { background: #ff6666; }
        .adm-btn-small { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 4px; cursor: pointer; font-size: 11px; font-family: inherit; font-weight: bold; }

        /* Hotbar Rápida */
        #hotbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; z-index: 100; box-shadow: 0 6px 0 #000; }
        .hotbar-slot { width: 52px; height: 52px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 20px; margin-top: 2px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 10px; color: #ffcc00; font-weight: bold; text-shadow: 1px 1px #000; }

        /* Cenários e Mapa */
        #game-canvas { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%); background-size: 16px 16px; z-index: 1; }
        #player { position: absolute; width: 42px; height: 52px; background: linear-gradient(to bottom, #7fa4ff 20%, #ffcc55 20%, #ffcc55 50%, #444 50%, #333 80%); border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 50; box-shadow: 0 6px 0 rgba(0,0,0,0.2); }

        .character { position: absolute; width: 50px; height: 50px; font-size: 24px; z-index: 10; border: 3px solid #1a110b; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #000; }
        .npc-label { position: absolute; top: -24px; background: #1c120c; color: #f4ecd8; padding: 2px 5px; border: 2px solid #573b24; font-size: 9px; font-weight: bold; white-space: nowrap; }
        
        #farm-zones { position: absolute; top: 160px; left: 340px; display: flex; flex-wrap: wrap; gap: 8px; max-width: calc(100vw - 380px); z-index: 5; }
        .plot { width: 72px; height: 72px; background: #422a18; border: 4px solid #26170c; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 4px 6px #000; }
        
        /* Sistema de Mutações Visuais */
        .crop { font-size: 30px; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; }
        .crop.growing { filter: grayscale(80%) brightness(40%) scale(0.6) !important; animation: none !important; }
        
        .crop.golden { filter: drop-shadow(0px 0px 6px #ffd700) brightness(1.3); animation: goldPulse 1.5s infinite alternate ease-in-out; }
        @keyframes goldPulse { 0% { transform: scale(1); } 100% { transform: scale(1.15) rotate(5deg); } }

        .crop.frozen { filter: drop-shadow(0px 0px 8px #70c5ff) hue-rotate(140deg); animation: freezeShudder 1.8s infinite linear; }
        @keyframes freezeShudder { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(2px); } }

        .crop.divine { filter: drop-shadow(0px 0px 12px #ff00ff) brightness(1.4); animation: divineFloat 1.2s infinite alternate ease-in-out; }
        @keyframes divineFloat { 0% { transform: translateY(0px); } 100% { transform: translateY(-6px); } }

        .crop.radioactive { filter: drop-shadow(0px 0px 10px #39ff14) saturate(3); animation: radTremble 0.3s infinite linear; }
        @keyframes radTremble { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }

        .crop.infernal { filter: drop-shadow(0px 0px 12px #ff3300) contrast(1.5); animation: flamePulse 0.8s infinite alternate ease; }
        @keyframes flamePulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .timer-bar { position: absolute; bottom: 4px; left: 4px; width: calc(100% - 8px); height: 5px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #38b349; }

        /* Modais */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 18px; z-index: 200; width: 92%; max-width: 560px; box-shadow: 0 10px 0px #000; color: #f4ecd8; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 6px; margin-bottom: 10px; }
        .modal-header h3 { margin: 0; color: #ffcc00; font-size: 13px; text-transform: uppercase; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 3px 8px; cursor: pointer; font-family: inherit; font-weight: bold; }
        
        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border: 2px solid #3d281a; background: #21160e; }
        .item-info { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .buy-btn { background: #2b5c16; color: white; border: 2px solid #142e09; border-bottom-width: 3px; padding: 4px 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; }
        .buy-btn:disabled { background: #3a3a3a; border-color: #111; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda Retrô Agrinho</h2>
        <p><span>🪙 Moedas:</span> <span id="coin-count">150</span></p>
        <p><span>🌱 Item Ativo:</span> <span id="selected-seed-text">Mão Vazia</span></p>
        <p><span style="color:#bf8eff;">🔮 Bênção Ativa:</span> <span id="bless-status">Nenhuma</span></p>
        <button class="btn-mochila" onclick="openBackpackModal()">🎒 Ver Mochila [Espaço]</button>
        <div id="shop-timer">Loja reestoca em: 03:00</div>
    </div>

    <button id="adm-trigger" onclick="toggleAdmPanel()">🛠️ Painel ADM</button>
    <div id="adm-panel">
        <h3>Menu Deus Campo v3.0</h3>
        <button class="adm-btn-block" style="background:#00ff00; color:#000;" onclick="aplicarAlteracoesADM()">⚡ Aplicar Modificações</button>
        <div class="adm-row">
            <label>🪙 Moedas:</label>
            <input type="number" id="adm-coins" class="adm-input" value="150">
        </div>
        <div class="adm-row">
            <label>🟫 Qtd Lotes (Max 24):</label>
            <input type="number" id="adm-plots" class="adm-input" value="6">
        </div>

        <hr style="border: 1px dashed #ff3333; margin: 10px 0;">
        <span style="font-size:10px; color:#ffcc00; display:block; text-align:center; font-weight:bold; margin-bottom:5px;">GERADOR DE RECURSOS INSTANTÂNEO</span>
        
        <div class="adm-row">
            <select id="adm-spawn-select" class="adm-input" style="width:65%;">
                <option value="maca">Semente Maçã 🌱</option>
                <option value="banana">Semente Banana 🌱</option>
                <option value="cenoura">Semente Cenoura 🌱</option>
                <option value="laranja">Semente Laranja 🌱</option>
                <option value="tomate">Semente Tomate 🌱</option>
                <option value="melancia">Semente Melancia 🌱</option>
                <option value="estrela">Semente Estrela 🌱</option>
                <option value="divina">Semente Divina 🌱</option>
            </select>
            <button class="adm-btn-small" style="width:30%;" onclick="admInjetarSementes()">+5 Itens</button>
        </div>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
    </div>

    <div id="game-canvas">
        <div id="player" style="top: 250px; left: 200px;">🧑‍🌾</div>
        <div id="npc-tiao" class="character" style="top: 25px; left: 360px; background: #2f4560;">🏪<span class="npc-label">Tião [E]</span></div>
        <div id="npc-mago" class="character" style="top: 25px; left: 540px; background: #50287a;">🧙‍♂️<span class="npc-label">Mago [E]</span></div>
        <div id="npc-chico" class="character" style="top: 25px; left: 720px; background: #7a431d;">👨‍💼<span class="npc-label">Chico [E]</span></div>
        <div id="farm-zones"></div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Painel</h3>
            <button class="close-btn" onclick="closeModal()">X</button>
        </div>
        <div id="modal-content" class="shop-grid"></div>
    </div>

    <script>
        let player = { x: 200, y: 250, speed: 5 };
        let gameState = { coins: 150, maxPlots: 6, activeHotbarSlot: 0, mutationBless: false };
        let keysPressed = {};
        let shopTimer = 180;
        let plots = [];
        let currentOpenNPC = null;

        const unidadesAleatorias = ["kg", "g", "mg", "lb", "oz", " toneladas cósmicas", "g quânticas", "g bio-alteradas"];

        const fruitData = {
            maca:    { name: "Maçã", icon: "🍎", seedPrice: 35,  basePrice: 65,  time: 4,  maxStock: 12 },
            banana:  { name: "Banana", icon: "🍌", seedPrice: 60,  basePrice: 110, time: 6,  maxStock: 9 },
            cenoura: { name: "Cenoura", icon: "🥕", seedPrice: 90,  basePrice: 175, time: 5,  maxStock: 7 },
            laranja: { name: "Laranja", icon: "🍊", seedPrice: 140, basePrice: 290, time: 8,  maxStock: 5 },
            tomate:  { name: "Tomate", icon: "🍅", seedPrice: 220, basePrice: 480, time: 10, maxStock: 4 },
            melancia:{ name: "Melancia", icon: "🍉", seedPrice: 400, basePrice: 950, time: 16, maxStock: 3 },
            estrela: { name: "Fruta Estrela", icon: "⭐", seedPrice: 850, basePrice: 2100, time: 25, maxStock: 2 },
            divina:  { name: "Divindade Mítica", icon: "🌌", seedPrice: 1800, basePrice: 5000, time: 40, maxStock: 1 }
        };

        let seedStock = {};

        const mutationConfig = {
            golden: { label: "Dourada ✨", mult: 3.0, class: "golden" },
            frozen: { label: "Congelada ❄️", mult: 2.2, class: "frozen" },
            divine: { label: "Divina 🌌", mult: 6.0, class: "divine" },
            radioactive: { label: "Radioativa ☢️", mult: 4.5, class: "radioactive" },
            infernal: { label: "Infernal 🔥", mult: 7.0, class: "infernal" }
        };

        let hotbar = Array(8).fill(null).map(() => ({ id: null, qty: 0, type: '', data: null }));

        function init() {
            restockShop();
            createPlots();
            updateUI();
            updateHotbarVisuals();

            setInterval(() => {
                if (shopTimer > 0) {
                    shopTimer--;
                } else {
                    shopTimer = 180;
                    restockShop();
                    if (currentOpenNPC === 'tiao') openNPCModal('tiao');
                }
                let mins = Math.floor(shopTimer / 60), secs = shopTimer % 60;
                let tEl = document.getElementById('shop-timer');
                if (tEl) tEl.innerText = `Loja reestoca em: ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);

            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing') {
                        plot.timer -= 0.1;
                        let totalTime = fruitData[plot.fruit].time;
                        let progress = Math.min(((totalTime - plot.timer) / totalTime) * 100, 100);
                        let fillBar = plot.element.querySelector('.timer-fill');
                        if (fillBar) fillBar.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            renderPlotAsset(plot);
                        }
                    }
                });
            }, 100);

            window.addEventListener('keydown', e => {
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
                keysPressed[e.key.toLowerCase()] = true;
                if (e.code === 'Space') { e.preventDefault(); openBackpackModal(); }
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') handleNPCDetection();
            });

            window.addEventListener('keyup', e => {
                keysPressed[e.key.toLowerCase()] = false;
            });

            gameLoop();
        }

        function restockShop() {
            Object.keys(fruitData).forEach(key => {
                seedStock[key] = fruitData[key].maxStock;
            });
        }

        // SISTEMA DE SEGURANÇA: Solicita a senha para abrir o painel
        function toggleAdmPanel() {
            let panel = document.getElementById('adm-panel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                let senha = prompt("Digite a senha do Painel ADM:");
                if (senha === "1234") {
                    panel.style.display = 'block';
                    document.getElementById('adm-coins').value = Math.floor(gameState.coins);
                    document.getElementById('adm-plots').value = gameState.maxPlots;
                } else {
                    alert("Senha incorreta!");
                }
            }
        }

        function aplicarAlteracoesADM() {
            gameState.coins = parseFloat(document.getElementById('adm-coins').value) || 0;
            let targetPlots = Math.min(parseInt(document.getElementById('adm-plots').value) || 6, 24);
            if(targetPlots !== gameState.maxPlots) {
                gameState.maxPlots = targetPlots;
                createPlots();
            }
            updateUI();
            alert("Modificações aplicadas!");
        }

        // GERADOR VOLTOU A FUNCIONAR: Injeta 5 sementes direto na hotbar
        function admInjetarSementes() {
            let itemKey = document.getElementById('adm-spawn-select').value;
            for(let i=0; i<5; i++) {
                addItemToHotbar(itemKey, 'semente', { icon: "🌱" });
            }
            updateHotbarVisuals();
            updateUI();
            alert(`Adicionado +5 Sementes de ${fruitData[itemKey].name} com sucesso!`);
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            let oldPlots = [...plots];
            plots = [];

            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot';
                plotDiv.innerHTML = `<span style="color:#26170c; font-size:8px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                container.appendChild(plotDiv);

                if (oldPlots[i]) {
                    plots.push(oldPlots[i]); plots[i].element = plotDiv;
                    if (plots[i].status !== 'empty') renderPlotAsset(plots[i]);
                } else {
                    plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutation: null, weight: 0, unit: '' });
                }
            }
            plots.forEach((p, idx) => p.element.onclick = () => handlePlotInteraction(idx));
        }

        function renderPlotAsset(plot) {
            let data = fruitData[plot.fruit];
            plot.element.innerHTML = '';
            
            let cropDiv = document.createElement('div');
            cropDiv.className = `crop ${plot.status === 'growing' ? 'growing' : ''}`;
            if (plot.status === 'ready' && plot.mutation) {
                cropDiv.classList.add(mutationConfig[plot.mutation].class);
            }
            cropDiv.innerText = data.icon;
            plot.element.appendChild(cropDiv);
            
            if (plot.status === 'growing') {
                let timerBar = document.createElement('div');
                timerBar.className = 'timer-bar';
                timerBar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(timerBar);
            }
        }

        function handlePlotInteraction(index) {
            let plot = plots[index];
            let activeItem = hotbar[gameState.activeHotbarSlot];

            if (plot.status === 'empty' && activeItem && activeItem.type === 'semente' && activeItem.qty > 0) {
                plot.status = 'growing';
                plot.fruit = activeItem.id;
                plot.timer = fruitData[plot.fruit].time;
                plot.mutation = null;

                let chance = gameState.mutationBless ? 0.60 : 0.20;
                if (Math.random() < chance) {
                    let muts = Object.keys(mutationConfig);
                    plot.mutation = muts[Math.floor(Math.random() * muts.length)];
                    gameState.mutationBless = false;
                }

                plot.weight = (Math.random() * 2 + 0.2).toFixed(2);
                plot.unit = unidadesAleatorias[Math.floor(Math.random() * unidadesAleatorias.length)];

                activeItem.qty--;
                if (activeItem.qty <= 0) hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', data: null };
                
                renderPlotAsset(plot); updateUI(); updateHotbarVisuals();
            } 
            else if (plot.status === 'ready') {
                let mult = plot.mutation ? mutationConfig[plot.mutation].mult : 1.0;
                let precoFinal = fruitData[plot.fruit].basePrice * mult * parseFloat(plot.weight);
                let labelCompleta = `${fruitData[plot.fruit].name} ${plot.mutation ? '['+mutationConfig[plot.mutation].label+']' : ''} (${plot.weight}${plot.unit})`;

                addItemToHotbar(plot.fruit, 'fruta', { icon: fruitData[plot.fruit].icon, price: precoFinal, fullName: labelCompleta });

                plot.status = 'empty';
                plot.fruit = null;
                plot.element.innerHTML = `<span style="color:#26170c; font-size:8px; position:absolute; bottom:4px; font-weight:bold;">Terra</span>`;
                updateUI();
            }
        }

        function addItemToHotbar(id, type, dataBlock) {
            let slot = hotbar.find(s => s.id === id && s.type === type);
            if (!slot) slot = hotbar.find(s => s.id === null);
            if (slot) {
                slot.id = id; slot.type = type; slot.qty = (slot.qty || 0) + 1; slot.data = dataBlock;
            }
            updateHotbarVisuals();
        }

        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = item.data?.icon || "🌱";
                    slot.querySelector('.slot-qty').innerText = "x" + item.qty;
                } else {
                    slot.querySelector('.slot-icon').innerText = '';
                    slot.querySelector('.slot-qty').innerText = '';
                }
            }
        }

        function handleNPCDetection() {
            if (Math.sqrt(Math.pow(player.x - 360, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('tiao');
            else if (Math.sqrt(Math.pow(player.x - 540, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('mago');
            else if (Math.sqrt(Math.pow(player.x - 720, 2) + Math.pow(player.y - 25, 2)) < 65) openNPCModal('chico');
        }

        function openNPCModal(npc) {
            currentOpenNPC = npc;
            let modal = document.getElementById('game-modal');
            modal.style.display = 'block';
            let content = document.getElementById('modal-content');
            content.innerHTML = '';
            
            if (npc === 'tiao') {
                document.getElementById('modal-title').innerText = "Mercado do Seu Tião";
                content.innerHTML += `<div style="color:#ffcc00; font-size:11px; margin-bottom:10px; text-align:center;">Próximo reabastecimento em: ${Math.floor(shopTimer/60)}m ${shopTimer%60}s</div>`;
                
                Object.keys(fruitData).forEach(k => {
                    let stock = seedStock[k];
                    let esgotado = stock <= 0;
                    content.innerHTML += `
                        <div class="shop-item">
                            <div class="item-info">
                                <span>🌱</span>
                                <div><b>Semente de ${fruitData[k].name}</b><br>Preço: ${fruitData[k].seedPrice} moedas | <span style="color:${esgotado?'#ff3333':'#00ff00'}">Estoque: ${stock} un.</span></div>
                            </div>
                            <button class="buy-btn" ${esgotado ? 'disabled' : ''} onclick="buySeed('${k}')">${esgotado ? 'Esgotado' : 'Comprar'}</button>
                        </div>`;
                });
            } 
            else if (npc === 'mago') {
                document.getElementById('modal-title').innerText = "Altar do Mago";
                content.innerHTML = `
                <div class="shop-item">
                    <div class="item-info">
                        <span>🔮</span>
                        <div><b>Bênção Cósmica (+40% Mutação)</b><br>Seu próximo plantio terá chances muito altas de sofrer mutações severas.</div>
                    </div>
                    <button class="buy-btn" style="background:#50287a;" ${gameState.mutationBless ? 'disabled':''} onclick="ativarAltar()">${gameState.mutationBless ? 'Já Ativo' : 'Encantar (100 🪙)'}</button>
                </div>`;
            } 
            else if (npc === 'chico') {
                document.getElementById('modal-title').innerText = "Exportação do Chico";
                let total = 0;
                hotbar.forEach(i => { if (i && i.type === 'fruta') total += i.data.price * i.qty; });
                
                content.innerHTML = `<p style="font-size:12px;">Suas frutas colhidas:</p><div style="background:#111; padding:6px; font-size:10px; max-height:150px; overflow-y:auto;">`;
                hotbar.forEach(i => { if(i && i.type === 'fruta') content.innerHTML += `▪️ ${i.data.fullName} x${i.qty} -> 🪙 ${Math.floor(i.data.price*i.qty)}<br>`; });
                content.innerHTML += `</div><h3 style="color:#ffcc00;">Total: 🪙 ${Math.floor(total)}</h3>
                <button class="buy-btn" style="width:100%; padding:8px;" onclick="venderTudo(${total})">Vender Tudo</button>`;
            }
        }

        function buySeed(k) {
            if (seedStock[k] <= 0) return;
            let preco = fruitData[k].seedPrice;
            if(gameState.coins >= preco) { 
                gameState.coins -= preco; 
                seedStock[k]--;
                addItemToHotbar(k, 'semente', { icon: "🌱" }); 
                updateUI(); 
                openNPCModal('tiao');
            } else alert("Dinheiro insuficiente!");
        }

        function activarAltar() {
            if(gameState.coins >= 100) {
                gameState.coins -= 100;
                gameState.mutationBless = true;
                closeModal(); updateUI();
            }
        }

        function venderTudo(valor) {
            gameState.coins += valor;
            hotbar = hotbar.map(i => i && i.type === 'fruta' ? { id: null, qty: 0, type: '', data: null } : i);
            updateHotbarVisuals(); closeModal(); updateUI();
        }

        function openBackpackModal() {
            currentOpenNPC = null;
            let modal = document.getElementById('game-modal'); modal.style.display = 'block';
            document.getElementById('modal-title').innerText = "Mochila";
            let content = document.getElementById('modal-content'); content.innerHTML = '';
            hotbar.forEach((i, index) => {
                if (i && i.id) {
                    content.innerHTML += `<div class="shop-item"><div>[Slot ${index+1}] ${i.type==='semente'?'Semente de ':''}<b>${i.data?.fullName || i.id}</b> (x${i.qty})</div></div>`;
                }
            });
            if(content.innerHTML === '') content.innerHTML = '<p style="text-align:center; color:#888;">Vazia.</p>';
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; currentOpenNPC = null; }
        
        function selectSlot(index) {
            gameState.activeHotbarSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((s, idx) => s.classList.toggle('selected', idx === index));
            updateUI();
        }

        function gameLoop() {
            if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
                if (keysPressed['w'] || keysPressed['arrowup']) player.y -= player.speed;
                if (keysPressed['s'] || keysPressed['arrowdown']) player.y += player.speed;
                if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= player.speed;
                if (keysPressed['d'] || keysPressed['arrowright']) player.x += player.speed;
            }
            player.x = Math.max(0, Math.min(window.innerWidth - 45, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 120, player.y));
            document.getElementById('player').style.left = player.x+'px';
            document.getElementById('player').style.top = player.y+'px';
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = Math.floor(gameState.coins);
            document.getElementById('bless-status').innerText = gameState.mutationBless ? "Ativada" : "Nenhuma";
            let item = hotbar[gameState.activeHotbarSlot];
            document.getElementById('selected-seed-text').innerText = item && item.id ? (item.type === 'semente' ? `Semente de ${fruitData[item.id].name}` : item.data.fullName) : 'Mão Vazia';
        }

        window.onload = init;
    </script>
</body>
</html>
