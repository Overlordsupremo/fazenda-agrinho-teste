<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda RPG - Expansão Vila & Mutações</title>
    <style>
        * { box-sizing: border-box; user-select: none; image-rendering: pixelated; }
        body { margin: 0; padding: 0; background-color: #1a2e10; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #fff; }
        
        /* UI Superior */
        #ui-top { position: absolute; top: 15px; left: 15px; background: #2c1e14; color: #f4ecd8; padding: 12px; border-radius: 2px; border: 4px solid #6b4c35; z-index: 100; min-width: 340px; box-shadow: 0 6px 0px #140d08; }
        #ui-top h2 { margin: 0 0 6px 0; color: #ffcc00; font-size: 14px; text-align: center; border-bottom: 3px double #4e3522; padding-bottom: 4px; text-transform: uppercase; text-shadow: 2px 2px #000; }
        #ui-top p { margin: 4px 0; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; }
        
        .btn-ui { background: #4a5da3; color: white; border: 2px solid #232e5c; border-bottom-width: 4px; padding: 4px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; margin-top: 4px; width: 100%; }
        .btn-ui:active { border-bottom-width: 2px; margin-top: 6px; }

        /* Painel ADM */
        #adm-trigger { position: absolute; top: 15px; right: 15px; background: #990000; color: #fff; border: 3px solid #ff3333; padding: 6px 12px; font-weight: bold; font-size: 11px; cursor: pointer; z-index: 200; box-shadow: 0 4px 0 #440000; }
        #adm-panel { display: none; position: absolute; top: 55px; right: 15px; background: #111116; border: 4px solid #ff3333; padding: 12px; z-index: 200; width: 300px; color: #00ff00; max-height: 80vh; overflow-y: auto; }
        .adm-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 11px; }
        .adm-input { width: 55%; background: #222; border: 1px solid #ff3333; color: #00ff00; padding: 2px; font-family: inherit; }

        /* Hotbar */
        #hotbar-container { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: #18120c; padding: 6px; border: 4px solid #4a3319; z-index: 100; box-shadow: 0 6px 0 #000; }
        .hotbar-slot { width: 56px; height: 56px; background: #362517; border: 3px solid #22160e; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .hotbar-slot.selected { border-color: #ffaa00; background: #4e3522; transform: scale(1.05); }
        .hotbar-slot .slot-num { position: absolute; top: 1px; left: 2px; font-size: 9px; color: #8c735b; }
        .hotbar-slot .slot-icon { font-size: 22px; }
        .hotbar-slot .slot-qty { position: absolute; bottom: 1px; right: 2px; font-size: 9px; color: #ffcc00; font-weight: bold; }

        /* Cenários */
        #game-screen { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; overflow: hidden; }
        .mapa { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; }
        #mapa-fazenda { background: #4d7a34; background-image: radial-gradient(#56873b 20%, transparent 20%); background-size: 16px 16px; display: block; }
        #mapa-vila { background: #73624c; background-image: linear-gradient(90deg, #665643 1px, transparent 1px); background-size: 32px 32px; }

        /* Elementos do Mapa */
        #player { position: absolute; width: 40px; height: 48px; background: #7fa4ff; border: 3px solid #111; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 50; transition: background 0.2s; }
        .character { position: absolute; width: 48px; height: 48px; font-size: 22px; z-index: 10; border: 3px solid #1a110b; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #000; }
        .npc-label { position: absolute; top: -22px; background: #1c120c; color: #f4ecd8; padding: 1px 4px; border: 2px solid #573b24; font-size: 8px; font-weight: bold; white-space: nowrap; }
        
        #portal-to-vila { position: absolute; bottom: 40px; right: 40px; width: 64px; height: 64px; background: #4a154b; border: 4px dashed #9b51e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; animation: spin 4s linear infinite; cursor: pointer; }
        #portal-to-fazenda { position: absolute; bottom: 40px; left: 40px; width: 64px; height: 64px; background: #27ae60; border: 4px dashed #2ecc71; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; animation: spin 4s linear infinite; cursor: pointer; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #bau-fazenda { position: absolute; top: 160px; left: 260px; width: 48px; height: 44px; background: #8e44ad; border: 3px solid #2c3e50; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; box-shadow: 0 4px 0 #000; }

        #farm-zones { position: absolute; top: 160px; left: 340px; display: flex; flex-wrap: wrap; gap: 8px; max-width: calc(100vw - 380px); }
        .plot { width: 76px; height: 76px; background: #422a18; border: 4px solid #26170c; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .plot.dry { background: #5a4535; border-color: #3a281c; }
        .plot.wet { background: #291a0e; border-color: #3498db; }
        
        /* Efeitos visuais acumulativos */
        .crop { font-size: 28px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .crop.growing { filter: grayscale(70%) brightness(50%) scale(0.7); }
        .crop-eff { position: absolute; font-size: 9px; top: -10px; background: rgba(0,0,0,0.7); border-radius: 3px; padding: 0 2px; white-space: nowrap; }

        .timer-bar { position: absolute; bottom: 3px; left: 4px; width: calc(100% - 8px); height: 4px; background: #111; }
        .timer-fill { height: 100%; width: 0%; background: #2ecc71; }

        /* Modais */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #291c12; border: 4px solid #543a24; padding: 16px; z-index: 200; width: 90%; max-width: 500px; box-shadow: 0 8px 0px #000; color: #f4ecd8; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #402b1b; padding-bottom: 4px; margin-bottom: 10px; }
        .modal-header h3 { margin: 0; color: #ffcc00; font-size: 13px; text-transform: uppercase; }
        .close-btn { background: #912323; color: white; border: 2px solid #4a1212; padding: 2px 6px; cursor: pointer; font-family: inherit; }
        
        .grid-list { display: flex; flex-direction: column; gap: 6px; }
        .grid-item { display: flex; align-items: center; justify-content: space-between; padding: 6px; border: 2px solid #3d281a; background: #21160e; font-size: 11px; }
        .action-btn { background: #2b5c16; color: white; border: 2px solid #142e09; padding: 4px 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 11px; }
        .action-btn:disabled { background: #444; border-color: #222; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="ui-top">
        <h2>Fazenda RPG Expandida</h2>
        <p><span>🪙 Moedas:</span> <span id="coin-count">200</span></p>
        <p><span>✋ Item Mão:</span> <span id="selected-item-text">Regador 💧</span></p>
        <button class="btn-ui" onclick="openWeightsModal()">⚖️ Ver Tabela de Pesos</button>
        <button class="btn-ui" onclick="openChestModal()">📦 Abrir Baú da Fazenda</button>
    </div>

    <button id="adm-trigger" onclick="toggleAdmPanel()">🛠️ Admin</button>
    <div id="adm-panel">
        <h3>Menu Deus Campo v4.0</h3>
        <button onclick="aplicarAlteracoesADM()" style="width:100%; color:black; background:#00ff00; font-weight:bold; margin-bottom:10px; border:none; padding:4px;">APLICAR ALTERAÇÕES</button>
        <div class="adm-row"><label>🪙 Moedas:</label><input type="number" id="adm-coins" class="adm-input" value="200"></div>
        <div class="adm-row"><label>🟫 Lotes:</label><input type="number" id="adm-plots" class="adm-input" value="6"></div>
        <hr style="border:1px dashed #ff3333;">
        <select id="adm-spawn-select" style="width:100%; background:#222; color:#00ff00; border:1px solid #ff3333; margin-bottom:5px;">
            <option value="maca">Semente Maçã 🌱</option>
            <option value="banana">Semente Banana 🌱</option>
            <option value="cenoura">Semente Cenoura 🌱</option>
            <option value="melancia">Semente Melancia 🌱</option>
            <option value="divina">Semente Divina 🌱</option>
        </select>
        <button onclick="admInjetarSementes()" style="width:100%; background:#222; color:#00ff00; border:1px solid #00ff00; cursor:pointer;">+5 Sementes Instantes</button>
    </div>

    <div id="hotbar-container">
        <div class="hotbar-slot selected" id="slot-0" onclick="selectSlot(0)"><span class="slot-num">1</span><span class="slot-icon">💧</span><span class="slot-qty">⚙️</span></div>
        <div class="hotbar-slot" id="slot-1" onclick="selectSlot(1)"><span class="slot-num">2</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-2" onclick="selectSlot(2)"><span class="slot-num">3</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-3" onclick="selectSlot(3)"><span class="slot-num">4</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-4" onclick="selectSlot(4)"><span class="slot-num">5</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-5" onclick="selectSlot(5)"><span class="slot-num">6</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-6" onclick="selectSlot(6)"><span class="slot-num">7</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
        <div class="hotbar-slot" id="slot-7" onclick="selectSlot(7)"><span class="slot-num">8</span><span class="slot-icon"></span><span class="slot-qty"></span></div>
    </div>

    <div id="game-screen">
        <div id="player" style="top: 250px; left: 200px;">🧑‍🌾</div>

        <div id="mapa-fazenda" class="mapa">
            <div id="npc-tiao" class="character" style="top: 30px; left: 340px; background: #2f4560;">🏪<span class="npc-label">Tião [E]</span></div>
            <div id="bau-fazenda" onclick="openChestModal()">📦<span class="npc-label" style="top:-18px;">Baú</span></div>
            <div id="farm-zones"></div>
            <div id="portal-to-vila" onclick="viajar('vila')">🌀<span class="npc-label" style="top:-18px;">Ir para Vila</span></div>
        </div>

        <div id="mapa-vila" class="mapa">
            <div id="npc-prefeito" class="character" style="top: 150px; left: 200px; background: #7f8c8d;">🎩<span class="npc-label">Prefeito [E]</span></div>
            <div id="npc-cozinheira" class="character" style="top: 150px; left: 450px; background: #e67e22;">🍳<span class="npc-label">Cozinheira [E]</span></div>
            <div id="npc-alquimista" class="character" style="top: 150px; left: 700px; background: #9b51e0;">🧙‍♀️<span class="npc-label">Alquimista [E]</span></div>
            <div id="portal-to-fazenda" onclick="viajar('fazenda')">🏡<span class="npc-label" style="top:-18px;">Voltar Fazenda</span></div>
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Menu</h3>
            <button class="close-btn" onclick="closeModal()">X</button>
        </div>
        <div id="modal-content" class="grid-list"></div>
    </div>

    <script>
        let player = { x: 200, y: 250, speed: 6, mapaAtual: 'fazenda' };
        let gameState = { coins: 200, maxPlots: 6, activeHotbarSlot: 0 };
        let keysPressed = {};
        let plots = [];
        let bauGeral = [];

        // Banco de dados de Frutas e Valores Valorizados (+ Lucrativos)
        const fruitData = {
            maca:    { name: "Maçã", icon: "🍎", seedPrice: 20,  basePrice: 50,  time: 4 },
            banana:  { name: "Banana", icon: "🍌", seedPrice: 45,  basePrice: 95,  time: 6 },
            cenoura: { name: "Cenoura", icon: "🥕", seedPrice: 70,  basePrice: 160, time: 5 },
            melancia:{ name: "Melancia", icon: "🍉", seedPrice: 150, basePrice: 380, time: 12 },
            divina:  { name: "Fruta Suprema", icon: "🌌", seedPrice: 500, basePrice: 1500, time: 25 }
        };

        // Mutações Normais (Naturais e acumuláveis)
        const mutacoesComuns = {
            "Dourada": { label: "✨ Dourada", mult: 2.5 },
            "Gigante": { label: "🧄 Gigante", mult: 3.0 },
            "Radioativa": { label: "☢️ Radioativa", mult: 4.0 }
        };

        // SUPER MUTAÇÕES EXCLUSIVAS (Não saem normalmente sem condições especiais ou missões)
        const superMutacoes = {
            "Cósmica": { label: "☄️ Cósmica", mult: 15.0 },
            "Temporal": { label: "⏳ Temporal", mult: 20.0 },
            "Divinal": { label: "🔱 Divinal", mult: 30.0 },
            "Infinitude": { label: "♾️ Infinitude", mult: 50.0 }
        };

        // Banco de Missões dos NPCs da Vila
        let quests = {
            prefeito: { desc: "O vilarejo precisa de fundos públicos. Entregue 300 moedas.", tipo: "moedas", alvo: 300, realizada: false, premio: { tipo: "super_semente", item: "divina", qtd: 3 } },
            cozinheira: { desc: "Preciso de uma Melancia Gigante bem pesada para o banquete real!", tipo: "fruta_mutada", fruta: "melancia", mutacao: "Gigante", realizada: false, premio: { tipo: "moedas", qtd: 600 } },
            alquimista: { desc: "Entregue qualquer fruta que tenha a raríssima Super Mutação Cósmica para estudos.", tipo: "super_mutacao", mutacao: "Cósmica", realizada: false, premio: { tipo: "ganhar_super", fruta: "divina", mut: "Infinitude" } }
        };

        // Setup da Hotbar (Slot 1 fixo como Regador)
        let hotbar = Array(8).fill(null).map((_, i) => i === 0 ? { id: 'regador', qty: 1, type: 'ferramenta', data: { icon: "💧", fullName: "Regador Mecânico" } } : { id: null, qty: 0, type: '', data: null });

        function init() {
            createPlots();
            updateUI();
            updateHotbarVisuals();

            // Loop de crescimento das plantas
            setInterval(() => {
                plots.forEach(plot => {
                    if (plot.status === 'growing' && plot.isWet) {
                        plot.timer -= 0.2;
                        let progress = Math.min(((fruitData[plot.fruit].time - plot.timer) / fruitData[plot.fruit].time) * 100, 100);
                        let fill = plot.element.querySelector('.timer-fill');
                        if (fill) fill.style.width = `${progress}%`;

                        if (plot.timer <= 0) {
                            plot.status = 'ready';
                            renderPlotAsset(plot);
                        }
                    }
                });
            }, 200);

            // Inputs do teclado
            window.addEventListener('keydown', e => {
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
                keysPressed[e.key.toLowerCase()] = true;
                if (['1','2','3','4','5','6','7','8'].includes(e.key)) selectSlot(parseInt(e.key) - 1);
                if (e.key.toLowerCase() === 'e') checarProximidadeNPC();
            });
            window.addEventListener('keyup', e => keysPressed[e.key.toLowerCase()] = false);

            gameLoop();
        }

        function viajar(destino) {
            player.mapaAtual = destino;
            document.getElementById('mapa-fazenda').style.display = destino === 'fazenda' ? 'block' : 'none';
            document.getElementById('mapa-vila').style.display = destino === 'vila' ? 'block' : 'none';
            if(destino === 'fazenda') { player.x = 200; player.y = 250; }
            else { player.x = 100; player.y = 300; }
        }

        function createPlots() {
            const container = document.getElementById('farm-zones');
            container.innerHTML = '';
            plots = [];
            for(let i = 0; i < gameState.maxPlots; i++) {
                let plotDiv = document.createElement('div');
                plotDiv.className = 'plot dry';
                plotDiv.innerHTML = `<span style="font-size:8px; color:#aaa; position:absolute; bottom:2px;">Seco</span>`;
                container.appendChild(plotDiv);
                plots.push({ element: plotDiv, status: 'empty', fruit: null, timer: 0, mutacoes: [], weight: 0, isWet: false });
            }
            plots.forEach((p, idx) => p.element.onclick = () => interagirLote(idx));
        }

        function renderPlotAsset(plot) {
            plot.element.innerHTML = '';
            let labelStatus = plot.isWet ? "Úmido" : "Seco";
            plot.element.className = `plot ${plot.isWet ? 'wet' : 'dry'}`;

            if(plot.status === 'empty') {
                plot.element.innerHTML = `<span style="font-size:8px; color:#aaa; position:absolute; bottom:2px;">${labelStatus}</span>`;
                return;
            }

            let cropDiv = document.createElement('div');
            cropDiv.className = `crop ${plot.status === 'growing' ? 'growing' : ''}`;
            cropDiv.innerText = fruitData[plot.fruit].icon;
            
            if(plot.mutacoes.length > 0) {
                let eff = document.createElement('div');
                eff.className = 'crop-eff';
                eff.innerText = `Mút. x${plot.mutacoes.length}`;
                cropDiv.appendChild(eff);
            }
            plot.element.appendChild(cropDiv);

            if(plot.status === 'growing') {
                let bar = document.createElement('div');
                bar.className = 'timer-bar';
                bar.innerHTML = `<div class="timer-fill"></div>`;
                plot.element.appendChild(bar);
            }
        }

        function interagirLote(index) {
            let plot = plots[index];
            let mao = hotbar[gameState.activeHotbarSlot];

            // 1. Ação de Regar
            if(mao && mao.id === 'regador') {
                plot.isWet = true;
                renderPlotAsset(plot);
                return;
            }

            // 2. Ação de Plantar (Só aceita se a terra já estiver molhada para estimular a mutação natural!)
            if(plot.status === 'empty' && mao && mao.type === 'semente' && mao.qty > 0) {
                plot.status = 'growing';
                plot.fruit = mao.id;
                plot.timer = fruitData[mao.id].time;
                plot.mutacoes = [];
                
                // Mutações Acumulativas Naturais (Acontecem apenas se plantado na terra molhada)
                if(plot.isWet) {
                    Object.keys(mutacoesComuns).forEach(m => {
                        if(Math.random() < 0.35) { // 35% de chance de pegar cada mutação
                            plot.mutacoes.push(m);
                        }
                    });
                }

                // Cálculo de Peso Aleatório
                plot.weight = parseFloat((Math.random() * 8 + 0.1).toFixed(2));

                mao.qty--;
                if(mao.qty <= 0) hotbar[gameState.activeHotbarSlot] = { id: null, qty: 0, type: '', data: null };
                
                renderPlotAsset(plot); updateUI(); updateHotbarVisuals();
                return;
            }

            // 3. Ação de Colher
            if(plot.status === 'ready') {
                // Calcular multiplicadores acumulados
                let totalMult = 1.0;
                let mutLabels = [];
                plot.mutacoes.forEach(m => {
                    let mData = mutacoesComuns[m] || superMutacoes[m];
                    if(mData) { totalMult *= mData.mult; mutLabels.push(mData.label); }
                });

                let precoFinal = Math.floor(fruitData[plot.fruit].basePrice * totalMult * (plot.weight / 2));
                let txtMut = mutLabels.length > 0 ? mutLabels.join(' + ') : 'Normal';
                
                let novaFruta = {
                    id: plot.fruit,
                    type: 'fruta',
                    qty: 1, // Frutas NÃO se acumulam no mesmo slot
                    data: {
                        icon: fruitData[plot.fruit].icon,
                        price: precoFinal,
                        weight: plot.weight,
                        muts: [...plot.mutacoes],
                        fullName: `${fruitData[plot.fruit].name} (${txtMut}) [${plot.weight}kg]`
                    }
                };

                // Tenta colocar em algum slot livre da Hotbar
                let livre = hotbar.findIndex((s, i) => i !== 0 && s.id === null);
                if(livre !== -1) {
                    hotbar[livre] = novaFruta;
                    // Reseta o lote
                    plot.status = 'empty';
                    plot.fruit = null;
                    plot.mutacoes = [];
                    plot.isWet = false;
                    renderPlotAsset(plot);
                    updateHotbarVisuals();
                } else {
                    alert("Sua Hotbar está cheia! Guarde algo no Baú ou venda itens.");
                }
            }
        }

        // Sistema de Baú da Fazenda (Guardar e retirar itens sem acumular)
        function openChestModal() {
            let modal = document.getElementById('game-modal');
            modal.style.display = 'block';
            document.getElementById('modal-title').innerText = "Baú de Armazenamento";
            renderChestContent();
        }

        function renderChestContent() {
            let content = document.getElementById('modal-content');
            content.innerHTML = `<h4 style="color:#ffcc00; margin:0;">Guardar da Hotbar:</h4>`;
            
            // Listar coisas da Hotbar que podem ser guardadas
            hotbar.forEach((item, index) => {
                if(item && item.id && item.id !== 'regador') {
                    content.innerHTML += `
                        <div class="grid-item">
                            <span>${item.data.fullName || item.id} (x${item.qty})</span>
                            <button class="action-btn" onclick="guardarNoBau(${index})">Guardar</button>
                        </div>`;
                }
            });

            content.innerHTML += `<h4 style="color:#ffcc00; margin:10px 0 0 0;">Itens no Baú:</h4>`;
            if(bauGeral.length === 0) content.innerHTML += `<p style="font-size:10px; color:#888;">Baú vazio.</p>`;
            
            bauGeral.forEach((item, index) => {
                content.innerHTML += `
                    <div class="grid-item">
                        <span>${item.data.fullName || item.id}</span>
                        <button class="action-btn" style="background:#8e44ad;" onclick="retirarDoBau(${index})">Retirar</button>
                    </div>`;
            });
        }

        function guardarNoBau(idxSlot) {
            let item = hotbar[idxSlot];
            bauGeral.push(JSON.parse(JSON.stringify(item)));
            hotbar[idxSlot] = { id: null, qty: 0, type: '', data: null };
            updateHotbarVisuals();
            renderChestContent();
        }

        function retirarDoBau(idxBau) {
            let livre = hotbar.findIndex((s, i) => i !== 0 && s.id === null);
            if(livre !== -1) {
                hotbar[livre] = bauGeral[idxBau];
                bauGeral.splice(idxBau, 1);
                updateHotbarVisuals();
                renderChestContent();
            } else {
                alert("Hotbar cheia para retirar!");
            }
        }

        // Tabela de Classificação de Pesos
        function openWeightsModal() {
            let modal = document.getElementById('game-modal');
            modal.style.display = 'block';
            document.getElementById('modal-title').innerText = "Tabela Oficial de Pesos";
            document.getElementById('modal-content').innerHTML = `
                <div style="font-size:11px; line-height:1.6;">
                    <p>🟩 <b>0.10kg a 1.99kg:</b> Fruta Leve (Multiplica Valor por 0.5x)</p>
                    <p>🟨 <b>2.00kg a 4.99kg:</b> Fruta Padrão (Multiplica Valor por 1.5x)</p>
                    <p>🟧 <b>5.00kg a 7.49kg:</b> Fruta Pesada (Multiplica Valor por 3.0x)</p>
                    <p>🟥 <b>7.50kg + :</b> Fruta Mística Titânica (Multiplica Valor por 5.0x)</p>
                </div>
            `;
        }

        // Mecânica de Missões dos NPCs da Vila
        function abrirMenuNPC(npcKey) {
            let modal = document.getElementById('game-modal');
            modal.style.display = 'block';
            let q = quests[npcKey];

            if(npcKey === 'tiao') {
                document.getElementById('modal-title').innerText = "Seu Tião Comerciante";
                let c = document.getElementById('modal-content');
                c.innerHTML = '<p>Compre sementes para plantar:</p>';
                Object.keys(fruitData).forEach(k => {
                    c.innerHTML += `
                        <div class="grid-item">
                            <span>🌱 Semente de ${fruitData[k].name} - 🪙${fruitData[k].seedPrice}</span>
                            <button class="action-btn" onclick="comprarSemente('${k}')">Comprar</button>
                        </div>`;
                });
                // Opção de Vender Frutas Individuais da hotbar para o Tião
                c.innerHTML += `<h4 style="color:#ffcc00; margin-top:10px;">Vender suas Frutas da Hotbar:</h4>`;
                hotbar.forEach((slot, index) => {
                    if(slot && slot.type === 'fruta') {
                        c.innerHTML += `
                            <div class="grid-item">
                                <span>${slot.data.fullName} -> Valor: 🪙${slot.data.price}</span>
                                <button class="action-btn" style="background:#c0392b;" onclick="venderItemIndividual(${index})">Vender</button>
                            </div>`;
                    }
                });
                return;
            }

            // Painel de Missões para os NPCs da Vila
            document.getElementById('modal-title').innerText = `Quests do ${npcKey.toUpperCase()}`;
            let html = `<p><b>Missão atual:</b> ${q.desc}</p>`;
            
            if(q.realizada) {
                html += `<p style="color:#00ff00; font-weight:bold;">✨ Missão Concluída e Recompensa Paga!</p>`;
            } else {
                html += `<button class="action-btn" style="width:100%; padding:8px;" onclick="entregarQuest('${npcKey}')">Entregar Missão</button>`;
            }
            document.getElementById('modal-content').innerHTML = html;
        }

        function entregarQuest(npcKey) {
            let q = quests[npcKey];
            let sucesso = false;

            if(q.tipo === "moedas") {
                if(gameState.coins >= q.alvo) {
                    gameState.coins -= q.alvo;
                    sucesso = true;
                }
            } 
            else if(q.tipo === "fruta_mutada") {
                let idx = hotbar.findIndex(s => s && s.id === q.fruta && s.data && s.data.muts.includes(q.mutacao));
                if(idx !== -1) {
                    hotbar[idx] = { id: null, qty: 0, type: '', data: null }; // consome a fruta
                    sucesso = true;
                }
            }
            else if(q.tipo === "super_mutacao") {
                let idx = hotbar.findIndex(s => s && s.data && s.data.muts.includes(q.mutacao));
                if(idx !== -1) {
                    hotbar[idx] = { id: null, qty: 0, type: '', data: null };
                    sucesso = true;
                }
            }

            if(sucesso) {
                q.realizada = true;
                // Pagar recompensas especiais
                if(q.premio.tipo === "moedas") gameState.coins += q.premio.qtd;
                if(q.premio.tipo === "super_semente") {
                    for(let i=0; i<q.premio.qtd; i++) {
                        adicionarItemForcado(q.premio.item, 'semente', { icon: "🌱", fullName: `Semente de ${fruitData[q.premio.item].name} Rara` });
                    }
                }
                if(q.premio.tipo === "ganhar_super") {
                    // Dá uma fruta pronta com a mutação de 50x de bônus!
                    adicionarItemForcado(q.premio.fruta, 'fruta', {
                        icon: fruitData[q.premio.fruta].icon,
                        price: 9999,
                        weight: 10.0,
                        muts: [q.premio.mut],
                        fullName: `🌌 ${fruitData[q.premio.fruta].name} [${superMutacoes[q.premio.mut].label}] (10kg)`
                    });
                }
                updateUI(); updateHotbarVisuals();
                abrirMenuNPC(npcKey);
                alert("Missão concluída com sucesso!");
            } else {
                alert("Você não possui os requisitos necessários para concluir essa missão!");
            }
        }

        function adicionarItemForcado(id, type, data) {
            let livre = hotbar.findIndex((s, i) => i !== 0 && s.id === null);
            if(livre !== -1) hotbar[livre] = { id: id, type: type, qty: 1, data: data };
        }

        function comprarSemente(k) {
            let preco = fruitData[k].seedPrice;
            if(gameState.coins >= preco) {
                let livre = hotbar.findIndex((s, i) => i !== 0 && s.id === null);
                if(livre !== -1) {
                    gameState.coins -= preco;
                    hotbar[livre] = { id: k, type: 'semente', qty: 5, data: { icon: "🌱", fullName: `Semente de ${fruitData[k].name}` } };
                    updateUI(); updateHotbarVisuals(); abrirMenuNPC('tiao');
                } else alert("Hotbar cheia!");
            } else alert("Sem moedas!");
        }

        function venderItemIndividual(idx) {
            if(hotbar[idx] && hotbar[idx].type === 'fruta') {
                gameState.coins += hotbar[idx].data.price;
                hotbar[idx] = { id: null, qty: 0, type: '', data: null };
                updateUI(); updateHotbarVisuals(); abrirMenuNPC('tiao');
            }
        }

        // Detecção de Proximidade e Interações com NPCs
        function checarProximidadeNPC() {
            if(player.mapaAtual === 'fazenda') {
                if (Math.sqrt(Math.pow(player.x - 340, 2) + Math.pow(player.y - 30, 2)) < 60) abrirMenuNPC('tiao');
            } else {
                if (Math.sqrt(Math.pow(player.x - 200, 2) + Math.pow(player.y - 150, 2)) < 60) abrirMenuNPC('prefeito');
                if (Math.sqrt(Math.pow(player.x - 450, 2) + Math.pow(player.y - 150, 2)) < 60) abrirMenuNPC('cozinheira');
                if (Math.sqrt(Math.pow(player.x - 700, 2) + Math.pow(player.y - 150, 2)) < 60) abrirMenuNPC('alquimista');
            }
        }

        // Funções Auxiliares do Painel ADM
        function toggleAdmPanel() {
            let p = document.getElementById('adm-panel');
            let s = prompt("Digite a senha ADM:");
            if(s === "1234") p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        function aplicarAlteracoesADM() {
            gameState.coins = parseInt(document.getElementById('adm-coins').value) || 0;
            gameState.maxPlots = Math.min(parseInt(document.getElementById('adm-plots').value) || 6, 24);
            createPlots(); updateUI();
        }
        function admInjetarSementes() {
            let k = document.getElementById('adm-spawn-select').value;
            adicionarItemForcado(k, 'semente', { icon: "🌱", fullName: `Semente de ${fruitData[k].name}` });
            hotbar.find(s => s && s.id === k).qty = 99; // injeta em grande escala
            updateHotbarVisuals();
        }

        function closeModal() { document.getElementById('game-modal').style.display = 'none'; }
        function selectSlot(idx) {
            gameState.activeHotbarSlot = idx;
            document.querySelectorAll('.hotbar-slot').forEach((s, i) => s.classList.toggle('selected', i === idx));
            updateUI();
        }
        function updateUI() {
            document.getElementById('coin-count').innerText = gameState.coins;
            let item = hotbar[gameState.activeHotbarSlot];
            document.getElementById('selected-item-text').innerText = item && item.id ? item.data.fullName : 'Mão Vazia ✋';
        }
        function updateHotbarVisuals() {
            for (let i = 0; i < 8; i++) {
                let slot = document.getElementById(`slot-${i}`);
                let item = hotbar[i];
                if (item && item.id) {
                    slot.querySelector('.slot-icon').innerText = item.data?.icon || "🌱";
                    slot.querySelector('.slot-qty').innerText = item.id === 'regador' ? '⚙️' : "x" + item.qty;
                } else { slot.querySelector('.slot-icon').innerText = ''; slot.querySelector('.slot-qty').innerText = ''; }
            }
        }

        // Game Loop de Movimentação do Personagem
        function gameLoop() {
            if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
                if (keysPressed['w'] || keysPressed['arrowup']) player.y -= player.speed;
                if (keysPressed['s'] || keysPressed['arrowdown']) player.y += player.speed;
                if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= player.speed;
                if (keysPressed['d'] || keysPressed['arrowright']) player.x += player.speed;
            }
            player.x = Math.max(0, Math.min(window.innerWidth - 40, player.x));
            player.y = Math.max(0, Math.min(window.innerHeight - 100, player.y));
            document.getElementById('player').style.left = player.x+'px';
            document.getElementById('player').style.top = player.y+'px';
            requestAnimationFrame(gameLoop);
        }

        window.onload = init;
    </script>
</body>
</html>
